<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Recipe Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">RecipeApp</a>
        </div>
    </nav>

    <div class="container d-flex justify-content-center">
        <div class="card shadow-sm border-0 w-100" style="max-width: 600px;">
            <div class="card-header bg-white"><h3 class="mb-0 text-primary">Recipe Details</h3></div>
            <div class="card-body p-4">

                <div th:if="${recipe != null}">
                    <table class="table table-borderless mb-0">
                        <tbody>
                            <tr>
                                <th scope="row" class="w-25 text-muted">Title:</th>
                                <td class="fw-bold fs-5" th:text="${recipe.title}"></td>
                            </tr>
                            <tr>
                                <th scope="row" class="text-muted">Cuisine 1:</th>
                                <td><span class="badge bg-secondary fs-6" th:text="${recipe.cuisine1}"></span></td>
                            </tr>
                            <tr>
                                <th scope="row" class="text-muted">Cuisine 2:</th>
                                <td><span class="badge bg-secondary fs-6" th:text="${recipe.cuisine2}"></span></td>
                            </tr>
                            <tr>
                                <th scope="row" class="text-muted">Difficulty:</th>
                                <td><strong class="text-danger" th:text="${recipe.difficulty}"></strong></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div th:if="${recipe == null}" class="alert alert-danger" role="alert">
                    <h4 class="alert-heading">Not Found!</h4>
                    <p class="mb-0">The requested recipe could not be found.</p>
                </div>

                <div class="mt-4">
                    <a href="/" class="btn btn-primary w-100">&larr; Back to Home</a>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
