<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Recipe</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">RecipeApp</a>
        </div>
    </nav>

    <div class="container" style="max-width: 600px;">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white"><h3 class="mb-0 text-primary">Add a New Recipe</h3></div>
            <div class="card-body p-4">
                <form action="#" th:action="@{/add-recipe}" th:object="${recipe}" method="post">
                    <div class="mb-3">
                        <label for="title" class="form-label fw-bold">Recipe Title:</label>
                        <input type="text" id="title" class="form-control" th:field="*{title}" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="cuisine1" class="form-label fw-bold">Cuisine 1:</label>
                        <input type="text" id="cuisine1" class="form-control" th:field="*{cuisine1}" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('cuisine1')}" th:errors="*{cuisine1}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="cuisine2" class="form-label fw-bold">Cuisine 2:</label>
                        <input type="text" id="cuisine2" class="form-control" th:field="*{cuisine2}" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('cuisine2')}" th:errors="*{cuisine2}"></div>
                    </div>

                    <div class="mb-4">
                        <label for="difficulty" class="form-label fw-bold">Difficulty:</label>
                        <select id="difficulty" class="form-select" th:field="*{difficulty}">
                            <option value="">--Select--</option>
                            <option value="Beginner">Beginner</option>
                            <option value="Intermediate">Intermediate</option>
                            <option value="Advanced">Advanced</option>
                        </select>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('difficulty')}" th:errors="*{difficulty}"></div>
                    </div>

                    <button type="submit" class="btn btn-success w-100 mb-3">Add Recipe to XML</button>
                    <div class="text-center">
                        <a class="text-decoration-none" href="/">&larr; Back to Recipes</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
