<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add User</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">RecipeApp</a>
        </div>
    </nav>

    <div class="container" style="max-width: 600px;">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white"><h3 class="mb-0 text-primary">Create a New User</h3></div>
            <div class="card-body p-4">
                <form action="#" th:action="@{/add-user}" th:object="${user}" method="post">
                    <div class="mb-3">
                        <label for="name" class="form-label fw-bold">Name:</label>
                        <input type="text" id="name" class="form-control" th:field="*{name}" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="surname" class="form-label fw-bold">Surname:</label>
                        <input type="text" id="surname" class="form-control" th:field="*{surname}" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('surname')}" th:errors="*{surname}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="skillLevel" class="form-label fw-bold">Skill Level:</label>
                        <select id="skillLevel" class="form-select" th:field="*{skillLevel}">
                            <option value="">--Select--</option>
                            <option value="Beginner">Beginner</option>
                            <option value="Intermediate">Intermediate</option>
                            <option value="Advanced">Advanced</option>
                        </select>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('skillLevel')}" th:errors="*{skillLevel}"></div>
                    </div>

                    <div class="mb-4">
                        <label for="preferredCuisine" class="form-label fw-bold">Preferred Cuisine:</label>
                        <input type="text" id="preferredCuisine" class="form-control" th:field="*{preferredCuisine}" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('preferredCuisine')}" th:errors="*{preferredCuisine}"></div>
                    </div>

                    <button type="submit" class="btn btn-success w-100 mb-3">Add User to XML</button>
                    <div class="text-center">
                        <a class="text-decoration-none" href="/">&larr; Back to Recipes</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
