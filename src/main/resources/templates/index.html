<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Recipe Recommendations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">RecipeApp</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/add-recipe">Add Recipe</a>
                <a class="nav-link" href="/add-user">Add User</a>
            </div>
        </div>
    </nav>

    <div class="container">

        <div class="row mb-4">
            <div class="col-md-7">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-white"><h5 class="mb-0">Recommendations</h5></div>
                    <div class="card-body">
                        <form method="get" class="d-flex align-items-center flex-wrap">
                            <select name="userPosition" class="form-select me-2 mb-2 w-auto">
                                <option th:each="user, stat : ${users}"
                                        th:value="${stat.index + 1}"
                                        th:text="${user.name} + ' ' + ${user.surname} + ' (' + ${user.skillLevel} + ')'"></option>
                            </select>
                            <button type="submit" formaction="/recommend-skill" class="btn btn-info text-white mb-2 me-1">By Skill</button>
                            <button type="submit" formaction="/recommend-skill-cuisine" class="btn btn-info text-white mb-2 me-1">By Skill &amp; Cuisine</button>
                            <a href="/" class="btn btn-warning mb-2">Reset</a>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-5">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-white"><h5 class="mb-0">XSLT View styling by User</h5></div>
                    <div class="card-body">
                        <form action="/xslt" method="get" class="d-flex align-items-center">
                            <select name="userPosition" class="form-select me-2">
                                <option th:each="user, stat : ${users}"
                                        th:value="${stat.index + 1}"
                                        th:text="${user.name} + ' ' + ${user.surname} + ' (' + ${user.skillLevel} + ')'"></option>
                            </select>
                            <button type="submit" class="btn btn-success text-nowrap">View (XSLT)</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <form action="/recipes-by-cuisine" method="get" class="row g-3 align-items-center">
                    <div class="col-auto">
                        <label class="col-form-label fw-bold">Search by Cuisine:</label>
                    </div>
                    <div class="col-auto">
                        <select name="cuisine" class="form-select">
                            <option value="Italian" th:selected="${selectedCuisine == 'Italian'}">Italian</option>
                            <option value="American" th:selected="${selectedCuisine == 'American'}">American</option>
                            <option value="Asian" th:selected="${selectedCuisine == 'Asian'}">Asian</option>
                            <option value="Mexican" th:selected="${selectedCuisine == 'Mexican'}">Mexican</option>
                            <option value="French" th:selected="${selectedCuisine == 'French'}">French</option>
                            <option value="Indian" th:selected="${selectedCuisine == 'Indian'}">Indian</option>
                            <option value="British" th:selected="${selectedCuisine == 'British'}">British</option>
                        </select>
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-outline-primary">Search</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 th:if="${selectedCuisine == null}" class="fs-4 text-dark">Recipes Display</h3>
            <h3 th:if="${selectedCuisine != null}" class="fs-4 text-dark" th:text="'Recipes Matching: ' + ${selectedCuisine}"></h3>
            <span class="badge bg-secondary" th:text="${recipes.size()} + ' recipes found'"></span>
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 mb-5">
            <div class="col" th:each="recipe : ${recipes}">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="card-title text-primary" th:text="${recipe.title}">Recipe Title</h5>
                        <p class="card-text mb-1">
                            <span class="badge bg-dark mr-1" th:text="${recipe.cuisine1}"></span>
                            <span class="badge bg-dark" th:text="${recipe.cuisine2}"></span>
                        </p>
                        <p class="card-text">
                            <small class="text-muted">Difficulty: </small>
                            <strong th:text="${recipe.difficulty}"></strong>
                        </p>
                        <a th:href="@{/recipe-details(title=${recipe.title})}" class="btn btn-sm btn-outline-primary mt-2">View Details &rarr;</a>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
